<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#28a745;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#20c997;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGradient)" filter="url(#shadow)"/>
  
  <!-- AI Brain Circuit Pattern -->
  <g stroke="white" stroke-width="2" fill="none" opacity="0.8">
    <!-- Circuit lines -->
    <path d="M60 80 Q80 60 100 80 Q120 100 140 80"/>
    <path d="M60 120 Q80 140 100 120 Q120 100 140 120"/>
    <path d="M80 60 Q100 80 120 60"/>
    <path d="M80 140 Q100 120 120 140"/>
    
    <!-- Circuit nodes -->
    <circle cx="60" cy="80" r="3" fill="white"/>
    <circle cx="140" cy="80" r="3" fill="white"/>
    <circle cx="60" cy="120" r="3" fill="white"/>
    <circle cx="140" cy="120" r="3" fill="white"/>
    <circle cx="80" cy="60" r="3" fill="white"/>
    <circle cx="120" cy="60" r="3" fill="white"/>
    <circle cx="80" cy="140" r="3" fill="white"/>
    <circle cx="120" cy="140" r="3" fill="white"/>
    <circle cx="100" cy="100" r="4" fill="white"/>
  </g>
  
  <!-- Plant/Seedling -->
  <g transform="translate(100, 100)">
    <!-- Stem -->
    <path d="M0 20 Q0 10 0 0" stroke="#ffffff" stroke-width="3" fill="none"/>
    
    <!-- Leaves -->
    <ellipse cx="-8" cy="5" rx="6" ry="12" fill="#ffffff" opacity="0.9" transform="rotate(-30 -8 5)"/>
    <ellipse cx="8" cy="5" rx="6" ry="12" fill="#ffffff" opacity="0.9" transform="rotate(30 8 5)"/>
    <ellipse cx="-5" cy="15" rx="5" ry="10" fill="#ffffff" opacity="0.8" transform="rotate(-45 -5 15)"/>
    <ellipse cx="5" cy="15" rx="5" ry="10" fill="#ffffff" opacity="0.8" transform="rotate(45 5 15)"/>
    
    <!-- Seed -->
    <circle cx="0" cy="25" r="3" fill="#ffffff"/>
  </g>
  
  <!-- Data Points (representing crop data) -->
  <g fill="white" opacity="0.6">
    <circle cx="40" cy="40" r="2"/>
    <circle cx="160" cy="40" r="2"/>
    <circle cx="40" cy="160" r="2"/>
    <circle cx="160" cy="160" r="2"/>
    <circle cx="100" cy="30" r="2"/>
    <circle cx="100" cy="170" r="2"/>
  </g>
</svg> 